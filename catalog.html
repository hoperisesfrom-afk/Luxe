<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Liz Luxe Shop</title>
<meta name="theme-color" content="#0a0a0a">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#0a0a0a;color:#f0ead6;font-size:14px}
:root{--gold:#C9972A;--gold-bg:rgba(201,151,42,0.13);--s2:#1c1c1c;--b:rgba(201,151,42,0.2);--t:#f0ead6;--t2:#8a7f6a;--ok:#7bc950;--err:#e06060;--r:14px;--rs:10px}
.wrap{max-width:480px;margin:0 auto;padding:0 14px 40px}
.header{text-align:center;padding:32px 20px 24px;border-bottom:1px solid var(--b);margin-bottom:20px}
.logo{font-size:28px;font-weight:800;color:var(--gold);font-style:italic;letter-spacing:.5px}
.tag{font-size:11px;color:var(--t2);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.status{font-size:12px;color:var(--t2);margin-top:12px;padding:10px 16px;background:var(--s2);border:1px solid var(--b);border-radius:var(--rs);display:inline-block}
.status.on{color:var(--ok);border-color:rgba(123,201,80,0.3)}
.search{width:100%;padding:12px 14px;font-size:14px;border:1px solid var(--b);border-radius:var(--rs);background:var(--s2);color:var(--t);outline:none;margin-bottom:16px}
.search:focus{border-color:var(--gold)}
.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:4px;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;border:1px solid var(--b);background:var(--s2);color:var(--t2)}
.pill.active{border-color:var(--gold);background:var(--gold);color:#0a0a0a}
.cat-title{font-size:11px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin:20px 0 10px;padding-left:4px}
.item{background:var(--s2);border:1px solid var(--b);border-radius:var(--r);padding:14px;margin-bottom:10px}
.item-name{font-size:15px;font-weight:700;color:var(--t);margin-bottom:4px}
.item-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.item-price{font-size:18px;font-weight:800;color:var(--gold)}
.item-stock{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.in-stock{background:rgba(55,110,35,0.22);color:var(--ok);border:1px solid rgba(123,201,80,0.25)}
.low-stock{background:rgba(160,35,35,0.22);color:var(--err);border:1px solid rgba(224,96,96,0.3)}
.wa-btn{display:block;width:100%;padding:14px;background:#25d366;color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;text-align:center;text-decoration:none;margin-top:24px;cursor:pointer}
.wa-btn:active{opacity:.9}
.empty{text-align:center;padding:40px;color:var(--t2);font-size:13px}
.skel{background:var(--s2);border:1px solid var(--b);border-radius:var(--r);padding:14px;margin-bottom:10px;height:80px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.footer{text-align:center;padding:24px 20px;color:var(--t2);font-size:12px;border-top:1px solid var(--b);margin-top:24px}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">Liz Luxe</div>
    <div class="tag">Luxury - Beauty - Style</div>
    <div class="status" id="status">Loading catalog...</div>
  </div>
  <input class="search" id="search" placeholder="Search items..." oninput="render()">
  <div class="pills" id="pills"></div>
  <div id="catalog"></div>
  <a class="wa-btn" href="https://wa.me/254703423367?text=Hi%20Liz%20Luxe" target="_blank">Order via WhatsApp</a>
  <div class="footer">Prices in KES - Stock updated daily<br><span style="color:var(--t2)">Liz Luxe POS - Private Catalog</span></div>
</div>
<script>
var SB = "https://atydgofseradfblzrdbn.supabase.co/rest/v1";
var ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0eWRnb2ZzZXJhZGZibHpyZGJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2ODc1NzgsImV4cCI6MjA5MzI2MzU3OH0.f9Slh4NyLDKDJ1nUQJ35GJDIKPZayhLyK9GFXSIihBc";
var inv = [], activeCat = "All";

function get(q) {
  return new Promise(function(resolve, reject) {
    var url = SB + "/inventory" + (q || "");
    var xhr = new XMLHttpRequest();
    xhr.open("GET", url, true);
    xhr.setRequestHeader("apikey", ANON_KEY);
    xhr.setRequestHeader("Authorization", "Bearer " + ANON_KEY);
    xhr.setRequestHeader("Accept", "application/json");
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4) {
        if (xhr.status >= 200 && xhr.status < 300) {
          try { resolve(JSON.parse(xhr.responseText)); }
          catch(e) { reject(new Error("Invalid JSON")); }
        } else {
          try { var err = JSON.parse(xhr.responseText); reject(new Error(err.message || err.error_description || "HTTP " + xhr.status)); }
          catch(e) { reject(new Error("HTTP " + xhr.status)); }
        }
      }
    };
    xhr.onerror = function() { reject(new Error("Network error")); };
    xhr.ontimeout = function() { reject(new Error("Timeout")); };
    xhr.timeout = 15000;
    xhr.send();
  });
}

function load() {
  var cat = document.getElementById("catalog");
  cat.innerHTML = '<div class="skel"></div><div class="skel"></div><div class="skel"></div>';
  get("?order=name.asc").then(function(data) {
    if (!Array.isArray(data)) throw new Error("Bad response");
    inv = data.filter(function(i){ return i.remaining > 0; });
    document.getElementById("status").textContent = inv.length + " items available";
    document.getElementById("status").classList.add("on");
    buildPills();
    render();
  }).catch(function(e) {
    console.error("Load error:", e);
    document.getElementById("status").textContent = "Error: " + e.message;
    document.getElementById("status").style.color = "var(--err)";
    cat.innerHTML = '<div class="empty"><div style="color:var(--err);font-weight:700;margin-bottom:8px;">Could not load</div><div style="font-size:12px;">' + e.message + '</div><div style="margin-top:12px;"><button onclick="load()" style="background:var(--gold);color:#0a0a0a;border:none;padding:10px 20px;border-radius:8px;font-weight:700;cursor:pointer;">Retry</button></div></div>';
  });
}

function buildPills() {
  var seen = {}; var cats = ["All"];
  inv.forEach(function(i){ var c = i.category || "Other"; if(!seen[c]){seen[c]=1;cats.push(c);} });
  cats.sort(function(a,b){ return a==="All"?-1:b==="All"?1:a.localeCompare(b); });
  var html = "";
  cats.forEach(function(c){
    var act = c===activeCat ? " active" : "";
    html += '<button class="pill' + act + '" onclick="setCat(' + "'" + c + "'" + ')">' + c + '</button>';
  });
  document.getElementById("pills").innerHTML = html;
}

function setCat(c){ activeCat = c; buildPills(); render(); }

function render() {
  var q = document.getElementById("search").value.toLowerCase();
  var list = inv.filter(function(i){
    var mq = !q || i.name.toLowerCase().indexOf(q)>=0 || (i.category||"").toLowerCase().indexOf(q)>=0;
    var mc = activeCat==="All" || (i.category||"Other")===activeCat;
    return mq && mc;
  });
  var el = document.getElementById("catalog");
  if(!list.length){ el.innerHTML='<div class="empty">No items found.</div>'; return; }
  var byCat = {};
  list.forEach(function(i){ var c = i.category || "Other"; if(!byCat[c]) byCat[c]=[]; byCat[c].push(i); });
  var html = "";
  Object.keys(byCat).sort().forEach(function(c){
    html += '<div class="cat-title">' + c + '</div>';
    byCat[c].forEach(function(i){
      var low = i.remaining < 3;
      var stockClass = low ? "low-stock" : "in-stock";
      var stockText = low ? "Only " + i.remaining + " left" : i.remaining + " in stock";
      html += '<div class="item">';
      html += '<div class="item-name">' + i.name + '</div>';
      html += '<div style="font-size:12px;color:var(--t2);">' + (i.category||"Other") + '</div>';
      html += '<div class="item-meta">';
      html += '<span class="item-price">KES ' + Math.round(i.selling_price).toLocaleString() + '</span>';
      html += '<span class="item-stock ' + stockClass + '">' + stockText + '</span>';
      html += '</div></div>';
    });
  });
  el.innerHTML = html;
}

load();
</script>
</body>
</html>
