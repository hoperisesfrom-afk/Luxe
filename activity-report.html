<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Liz Luxe - Activity Report</title>
<meta name="theme-color" content="#0a0a0a">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#f0ead6;font-size:14px}
:root{
  --gold:#C9972A;--gold-d:#a67c1e;--gold-bg:rgba(201,151,42,0.13);
  --s:#141414;--s2:#1c1c1c;--s3:#242424;
  --b:rgba(201,151,42,0.2);--b2:rgba(201,151,42,0.35);--b3:rgba(255,255,255,0.07);
  --t:#f0ead6;--t2:#8a7f6a;--t3:#4a4030;
  --ok-bg:rgba(55,110,35,0.22);--ok:#7bc950;
  --err-bg:rgba(160,35,35,0.22);--err:#e06060;
  --info:#6aabf0;--info-bg:rgba(40,100,180,0.15);
  --r:14px;--rs:10px;
}
.shell{max-width:480px;margin:0 auto;padding:14px;padding-bottom:80px;overflow-y:auto;height:100vh;-webkit-overflow-scrolling:touch}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;background:var(--s);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:100}
.logo-name{font-size:20px;font-weight:800;color:var(--gold);font-style:italic;letter-spacing:.5px}
.logo-sub{font-size:9px;color:var(--t2);letter-spacing:3px;text-transform:uppercase}
.btn{display:block;width:100%;padding:12px 18px;border-radius:var(--rs);font-size:14px;cursor:pointer;border:1px solid var(--b);background:var(--s3);color:var(--t);font-weight:600;text-align:center}
.btn:active{opacity:.8}
.bp{background:var(--gold);color:#0a0a0a;border-color:var(--gold)}
.bsm{padding:8px 14px;font-size:12px}
.empty{text-align:center;padding:32px;color:var(--t2);font-size:13px}
.toast{position:fixed;bottom:12px;left:14px;right:14px;max-width:452px;margin:0 auto;background:#1a1500;color:var(--gold);padding:13px 16px;border-radius:var(--rs);font-size:13px;font-weight:600;z-index:9999;opacity:0;transform:translateY(6px);transition:all .25s;pointer-events:none;border:1px solid var(--b2);text-align:center}
.toast.on{opacity:1;transform:translateY(0)}
.toast.ok{background:rgba(35,70,18,.97);color:var(--ok);border-color:rgba(123,201,80,.3)}
.toast.err{background:rgba(70,18,18,.97);color:var(--err);border-color:rgba(224,96,96,.3)}

/* Activity Report Table */
.act-header{display:grid;grid-template-columns:80px 1fr 70px 70px 90px 80px 80px 80px;gap:8px;padding:10px 14px;background:var(--s2);border:1px solid var(--b);border-radius:var(--rs) var(--rs) 0 0;font-size:11px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.04em;min-width:560px}
.act-row{display:grid;grid-template-columns:80px 1fr 70px 70px 90px 80px 80px 80px;gap:8px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--b3);min-width:560px;font-size:13px;background:var(--s2)}
.act-row:hover{background:var(--s3)}
.act-date{color:var(--t2);font-size:12px}
.act-event{min-width:0}
.act-event-title{font-weight:600;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-event-wallet{font-size:11px;color:var(--t2);margin-top:2px}
.act-in{text-align:right;color:var(--ok);font-weight:700}
.act-out{text-align:right;color:var(--err);font-weight:700}
.act-bal{text-align:right;color:var(--gold);font-weight:800;font-size:14px}
.act-cred{text-align:right;color:var(--err);font-weight:700}
.act-net{text-align:right;color:var(--t);font-weight:700}
.act-opening{background:var(--info-bg);border-left:3px solid var(--info);padding:10px 14px;font-size:13px;color:var(--info);font-weight:600;margin-bottom:4px;min-width:560px}
.act-total-row{background:var(--s3);border-top:2px solid var(--b2);padding:12px 14px;font-weight:800;font-size:14px;min-width:560px}
.act-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--b);border-radius:0 0 var(--rs) var(--rs)}

.filter-bar{display:flex;gap:8px;align-items:center;padding:10px 14px;background:var(--s2);border:1px solid var(--b);border-radius:var(--rs);margin-bottom:12px;flex-wrap:wrap}
.filter-bar select{flex:1;padding:8px 10px;font-size:12px;background:var(--s3);border:1px solid var(--b);border-radius:var(--rs);color:var(--t);font-family:inherit;min-width:120px}
.filter-bar input[type=date]{flex:1;padding:8px;font-size:12px;background:var(--s3);border:1px solid var(--b);border-radius:var(--rs);color:var(--t);font-family:inherit}
.stat-bar{background:var(--s2);border:1px solid var(--b);border-radius:var(--r);padding:14px;margin-bottom:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;align-items:center}
.stat-bar-label{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:4px}
.stat-bar-value{font-size:16px;font-weight:800;color:var(--gold)}
.login-screen{position:fixed;inset:0;background:#0a0a0a;z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.login-screen.hidden{display:none}
.login-logo{font-size:36px;font-weight:800;color:var(--gold);font-style:italic;letter-spacing:1px;margin-bottom:4px}
.login-sub{font-size:10px;color:var(--t2);letter-spacing:4px;text-transform:uppercase;margin-bottom:48px}
.login-box{width:100%;max-width:340px}
.login-field{margin-bottom:14px}
.login-field label{font-size:11px;color:var(--t2);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;display:block}
.login-field input{width:100%;padding:13px 14px;font-size:15px;border:1px solid var(--b2);border-radius:var(--rs);background:var(--s2);color:var(--t);outline:none}
.login-field input:focus{border-color:var(--gold)}
.login-btn{width:100%;padding:14px;background:var(--gold);color:#0a0a0a;border:none;border-radius:var(--rs);font-size:15px;font-weight:800;cursor:pointer;margin-top:8px;letter-spacing:.3px}
.login-err{color:var(--err);font-size:13px;text-align:center;margin-top:12px;min-height:20px;font-weight:600}
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-logo">Liz Luxe</div>
  <div class="login-sub">Activity Report</div>
  <div class="login-box">
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="Your email address" autocomplete="email">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div class="shell" id="app-shell" style="display:none">
  <div class="topbar">
    <div>
      <div class="logo-name">Liz Luxe</div>
      <div class="logo-sub">Activity Report</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn bsm" onclick="exportCSV()">Export CSV</button>
      <button class="btn bsm bp" onclick="shareWhatsApp()">Share</button>
    </div>
  </div>

  <div class="stat-bar">
    <div><div class="stat-bar-label">Cash In</div><div class="stat-bar-value" id="stat-in">KES 0</div></div>
    <div><div class="stat-bar-label">Cash Out</div><div class="stat-bar-value" id="stat-out" style="color:var(--err)">KES 0</div></div>
    <div><div class="stat-bar-label">Net Value</div><div class="stat-bar-value" id="stat-net">KES 0</div></div>
  </div>

  <div class="filter-bar">
    <select id="month-sel" onchange="onMonthChange()">
      <option value="">Pick month...</option>
    </select>
    <input type="date" id="date-from" onchange="onDateChange()">
    <span style="color:var(--t2);font-size:12px">to</span>
    <input type="date" id="date-to" onchange="onDateChange()">
    <button class="btn bsm" onclick="clearFilter()" style="width:auto;flex-shrink:0">All</button>
  </div>

  <div class="act-header">
    <div>Date</div>
    <div>Event</div>
    <div style="text-align:right">Cash In</div>
    <div style="text-align:right">Cash Out</div>
    <div style="text-align:right;color:var(--gold)">Balance</div>
    <div style="text-align:right;color:var(--err)">Credit</div>
    <div style="text-align:right;color:var(--info)">Cust Bal</div>
    <div style="text-align:right">Net Value</div>
  </div>
  <div class="act-scroll" id="table-body">
    <div class="empty">Loading...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SB = 'https://atydgofseradfblzrdbn.supabase.co/rest/v1';
var SB_AUTH = 'https://atydgofseradfblzrdbn.supabase.co/auth/v1';
var ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0eWRnb2ZzZXJhZGZibHpyZGJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2ODc1NzgsImV4cCI6MjA5MzI2MzU3OH0.f9Slh4NyLDKDJ1nUQJ35GJDIKPZayhLyK9GFXSIihBc';
var authToken = null;
var SESSION_KEY = 'llpos_session';

function getHeaders() {
  var h = {};
  h['Content-Type'] = 'application/json';
  h['apikey'] = ANON_KEY;
  h['Authorization'] = 'Bearer ' + (authToken || ANON_KEY);
  h['Prefer'] = 'return=representation';
  return h;
}

function saveSession(access) {
  authToken = access;
  try { localStorage.setItem(SESSION_KEY, JSON.stringify({access: access})); } catch(e) {}
}

function loadSession() {
  try {
    var s = localStorage.getItem(SESSION_KEY);
    if (s) { var d = JSON.parse(s); authToken = d.access; return true; }
  } catch(e) {}
  return false;
}

function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  var password = document.getElementById('login-password').value;
  var btn = document.getElementById('login-btn');
  var err = document.getElementById('login-err');
  if (!email || !password) { err.textContent = 'Please enter email and password.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in...'; err.textContent = '';
  fetch(SB_AUTH + '/token?grant_type=password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'apikey': ANON_KEY},
    body: JSON.stringify({email: email, password: password})
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.access_token) {
      saveSession(d.access_token);
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app-shell').style.display = 'block';
      initApp();
    } else {
      err.textContent = d.error_description || d.msg || 'Invalid email or password.';
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }).catch(function() {
    err.textContent = 'Network error. Check your connection.';
    btn.disabled = false; btn.textContent = 'Sign In';
  });
}

function req(method, table, body, qs) {
  return fetch(SB + '/' + table + (qs || ''), {method: method, headers: getHeaders(), body: body ? JSON.stringify(body) : undefined})
    .then(function(r) {
      if (!r.ok) return r.json().then(function(e) { throw new Error(e.message || 'Error ' + r.status); });
      return r.text().then(function(t) { return t ? JSON.parse(t) : []; });
    });
}
function dbGet(t, q) { return req('GET', t, null, q); }

function fmt(n) { return 'KES ' + Math.round(n || 0).toLocaleString(); }
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast on' + (type ? ' ' + type : '');
  setTimeout(function() { el.className = 'toast'; }, 3500);
}

var _data = null;

function getRange() {
  var from = document.getElementById('date-from').value;
  var to = document.getElementById('date-to').value;
  if (from && to) return {from: from, to: to};
  if (from && !to) return {from: from, to: new Date().toISOString().slice(0, 10)};
  if (!from && to) return {from: '2000-01-01', to: to};
  var sel = document.getElementById('month-sel');
  var month = sel ? sel.value : '';
  if (month) {
    var last = new Date(parseInt(month.split('-')[0]), parseInt(month.split('-')[1]), 0);
    return {from: month + '-01', to: month + '-' + String(last.getDate()).padStart(2, '0')};
  }
  return {from: '2000-01-01', to: new Date().toISOString().slice(0, 10)};
}

function onMonthChange() {
  document.getElementById('date-from').value = '';
  document.getElementById('date-to').value = '';
  loadData();
}

function onDateChange() {
  document.getElementById('month-sel').value = '';
  loadData();
}

function clearFilter() {
  document.getElementById('date-from').value = '';
  document.getElementById('date-to').value = '';
  document.getElementById('month-sel').value = '';
  loadData();
}

function getCustName(title) {
  if (!title) return '';
  return title.replace(/^[^:]+:\s*/, '');
}

function loadData() {
  var el = document.getElementById('table-body');
  el.innerHTML = '<div class="empty">Loading...</div>';
  var range = getRange();
  var from = range.from;
  var to = range.to;

  Promise.all([
    dbGet('sales','?order=date.asc'),
    dbGet('deductions','?order=date.asc'),
    dbGet('transfers','?order=date.asc'),
    dbGet('returns','?order=date.asc')
  ]).then(function(r) {
    var allSales = r[0], allDeds = r[1], allTransfers = r[2], allReturns = r[3];

    var events = [];

    // --- Process ALL sales (from beginning of time) ---
    allSales.forEach(function(s) {
      var total = s.total || 0;
      var paid = s.paid || 0;
      var balance = s.balance || 0;
      var items = (s.items || []).map(function(i){return i.qty+'x '+i.name;}).join(', ');
      var receipt = s.receipt_ref || '';
      var isReturned = (s.method || '').indexOf('Returned') >= 0;

      if (isReturned) {
        // Returned sale — show as negative sale
        events.push({
          date: s.date,
          type: 'returned',
          title: 'Return: ' + s.customer_name,
          detail: items + (receipt ? ' | ' + receipt : ''),
          wallet: s.method || 'Cash',
          cashIn: 0,
          cashOut: paid,  // Refund = cash out
          creditChange: -balance  // Credit reduction
        });
      } else {
        // Regular sale — use current DB values directly (source of truth)
        events.push({
          date: s.date,
          type: 'sale',
          title: 'Sale: ' + s.customer_name,
          detail: items + (receipt ? ' | ' + receipt : ''),
          wallet: s.method || 'Cash',
          cashIn: paid,     // Already includes all payments
          cashOut: 0,
          creditChange: balance  // Current balance as stored in DB
        });
      }
    });

    // --- Process ALL deductions (from beginning of time) ---
    allDeds.forEach(function(d) {
      var isInj = d.type === 'injection';
      events.push({
        date: d.date,
        type: isInj ? 'capital' : 'expense',
        title: (isInj ? '+ Capital: ' : '- Expense: ') + (d.reason || ''),
        detail: (d.category || '') + (d.wallet ? ' | ' + d.wallet : ''),
        wallet: d.wallet || 'Cash',
        cashIn: isInj ? (d.amount || 0) : 0,
        cashOut: isInj ? 0 : (d.amount || 0),
        creditChange: 0
      });
    });

    // --- Process ALL returns (from beginning of time) ---
    allReturns.forEach(function(ret) {
      var items = (ret.items || []).map(function(i){return i.qty+'x '+i.name;}).join(', ');
      events.push({
        date: ret.date,
        type: 'returned',
        title: 'Return: ' + (ret.customer_name || ''),
        detail: items + (ret.reason ? ' | ' + ret.reason : ''),
        wallet: 'Refund',
        cashIn: 0,
        cashOut: ret.total || 0,
        creditChange: 0
      });
    });

    // Sort all events by date
    events.sort(function(a,b){ return a.date.localeCompare(b.date); });

    // Calculate running totals from ZERO (matching index.html)
    var runningBalance = 0;
    var runningCredit = 0;
    var customerBalances = {};
    var totalCashIn = 0, totalCashOut = 0;

    events.forEach(function(e) {
      runningBalance += e.cashIn - e.cashOut;

      // Track per-customer balance
      var cust = getCustName(e.title);
      if (cust) {
        if (!customerBalances[cust]) customerBalances[cust] = 0;
        customerBalances[cust] += e.creditChange;
        if (customerBalances[cust] < 0) customerBalances[cust] = 0;
      }
      e.custBalance = cust ? customerBalances[cust] : 0;

      // Apply credit change
      runningCredit += e.creditChange;
      if (runningCredit < 0) {
        // Overpayment: credit goes to 0, excess becomes cash
        runningBalance += Math.abs(runningCredit);
        runningCredit = 0;
      }

      e.balanceAfter = runningBalance;
      e.creditAfter = runningCredit;
      e.netAfter = runningBalance + runningCredit;
      totalCashIn += e.cashIn;
      totalCashOut += e.cashOut;
    });

    // Final credit = sum of all current sale balances (DB source of truth)
    var dbTotalCredit = allSales.reduce(function(s, x) { return s + Math.max(0, x.balance || 0); }, 0);
    var dbTotalPaid = allSales.reduce(function(s, x) { return s + (x.paid || 0); }, 0);
    var dbTotalSales = allSales.reduce(function(s, x) { return s + (x.total || 0); }, 0);

    // Use DB credit as final (matches index.html exactly)
    var finalCredit = dbTotalCredit;
    var finalBalance = runningBalance;
    // Adjust for any credit drift
    var creditDiff = finalCredit - runningCredit;
    if (creditDiff !== 0) {
      finalBalance += creditDiff; // Overpayments/underpayments affect cash
    }
    var finalNet = finalBalance + finalCredit;

    _data = {
      events: events,
      openingBalance: 0,  // Always starts from zero
      openingCredit: 0,
      totalCashIn: totalCashIn,
      totalCashOut: totalCashOut,
      finalBalance: finalBalance,
      finalCredit: finalCredit,
      finalNet: finalNet,
      from: from,
      to: to,
      customerBalances: customerBalances,
      dbTotalCredit: dbTotalCredit,
      dbTotalPaid: dbTotalPaid,
      dbTotalSales: dbTotalSales,
      eventCredit: runningCredit,
      creditDiff: creditDiff
    };

    // Filter events for display (only show events within selected period)
    var displayEvents = events.filter(function(e) {
      return e.date >= from && e.date <= to;
    });

    document.getElementById('stat-in').textContent = fmt(totalCashIn);
    document.getElementById('stat-out').textContent = fmt(totalCashOut);
    document.getElementById('stat-net').textContent = fmt(finalNet);

    var html = '';

    if (!displayEvents.length) {
      html += '<div class="empty" style="padding:40px">No transactions for this period</div>';
    } else {
      var lastDate = '';
      displayEvents.forEach(function(e) {
        var dateStr = e.date;
        try { dateStr = new Date(e.date+'T12:00:00').toLocaleDateString('en-KE',{day:'numeric',month:'short'}); } catch(err) {}
        var showDate = e.date !== lastDate;
        lastDate = e.date;

        var icon = e.type === 'sale' ? 'Sale' : e.type === 'payment' ? 'Pay' : e.type === 'returned' ? 'Ret' : e.type === 'expense' ? 'Exp' : e.type === 'capital' ? 'Cap' : '?';
        var color = e.type === 'expense' ? 'var(--err)' : e.type === 'capital' ? 'var(--ok)' : e.type === 'payment' ? 'var(--ok)' : e.type === 'returned' ? 'var(--err)' : 'var(--t)';

        html += '<div class="act-row">';
        html += '<div class="act-date">' + (showDate ? dateStr : '') + '</div>';
        html += '<div class="act-event">';
        html += '<div class="act-event-title" style="color:' + color + '">' + icon + ': ' + e.title + '</div>';
        html += '<div class="act-event-wallet">' + e.wallet + (e.detail ? ' | ' + e.detail : '') + '</div>';
        html += '</div>';
        html += '<div class="act-in">' + (e.cashIn > 0 ? '+' + fmt(e.cashIn) : '') + '</div>';
        html += '<div class="act-out">' + (e.cashOut > 0 ? '-' + fmt(e.cashOut) : '') + '</div>';
        html += '<div class="act-bal">' + fmt(e.balanceAfter) + '</div>';
        html += '<div class="act-cred">' + (e.creditChange > 0 ? '+' + fmt(e.creditChange) : e.creditChange < 0 ? fmt(e.creditChange) : '') + '</div>';
        html += '<div style="text-align:right;color:var(--info);font-weight:700;font-size:13px;">' + (e.custBalance > 0 ? fmt(e.custBalance) : '') + '</div>';
        html += '<div class="act-net">' + fmt(e.netAfter) + '</div>';
        html += '</div>';
      });

      html += '<div class="act-total-row" style="display:grid;grid-template-columns:80px 1fr 70px 70px 90px 80px 80px 80px;gap:8px;align-items:center">';
      html += '<div></div><div style="color:var(--t2)">Final (All Time)</div>';
      html += '<div class="act-in">+' + fmt(totalCashIn) + '</div>';
      html += '<div class="act-out">-' + fmt(totalCashOut) + '</div>';
      html += '<div class="act-bal">' + fmt(finalBalance) + '</div>';
      html += '<div class="act-cred">' + (finalCredit > 0 ? fmt(finalCredit) : '') + '</div>';
      html += '<div style="text-align:right;color:var(--t3);font-size:11px;">—</div>';
      html += '<div class="act-net">' + fmt(finalNet) + '</div>';
      html += '</div>';
    }

    el.innerHTML = html;

  }).catch(function(e) {
    var msg = e && e.message ? e.message : String(e || 'Unknown error');
    if (msg.indexOf('JWT') >= 0 || msg.indexOf('expired') >= 0 || msg.indexOf('token') >= 0 || msg.indexOf('401') >= 0 || msg.indexOf('403') >= 0) {
      authToken = null;
      try { localStorage.removeItem(SESSION_KEY); } catch(err) {}
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('app-shell').style.display = 'none';
      document.getElementById('login-err').textContent = 'Session expired. Please sign in again.';
      toast('Session expired. Please sign in again.', 'err');
      return;
    }
    el.innerHTML = '<div class="empty">Error: ' + msg + '</div>';
    console.error('Activity Report error:', e);
  });
}

function exportCSV() {
  var d = _data;
  if (!d || !d.events.length) { toast('No data to export', 'err'); return; }

  // ═══════════════════════════════════════════════════════════════
  // SHEET 1: ACTIVITY REPORT (existing format)
  // ═══════════════════════════════════════════════════════════════
  var s1 = [
    ['LIZ LUXE - ACTIVITY REPORT'],
    ['Period: ' + d.from + ' to ' + d.to],
    [],
    ['Date','Type','Event','Wallet / Detail','Cash In (KES)','Cash Out (KES)','Cash Balance (KES)','Credit Change (KES)','Cust Balance (KES)','Net Value (KES)']
  ];

  if (d.openingBalance !== 0 || d.openingCredit !== 0) {
    s1.push(['Opening','Opening','Opening Balance','','', '', d.openingBalance, d.openingCredit, '', d.openingBalance + d.openingCredit]);
  }

  d.events.forEach(function(e) {
    s1.push([e.date, e.type, e.title, e.wallet + (e.detail ? ' | ' + e.detail : ''), e.cashIn || '', e.cashOut || '', e.balanceAfter, e.creditChange || '', e.custBalance || '', e.netAfter]);
  });

  s1.push([]);
  s1.push(['','','','TOTALS', d.totalCashIn, d.totalCashOut, d.finalBalance, d.finalCredit, '', d.finalNet]);

  // ═══════════════════════════════════════════════════════════════
  // SHEET 2: MONEY FLOW (actual cash in / cash out tracking)
  // Every coin that moved. No credit — just real money.
  // ═══════════════════════════════════════════════════════════════
  var s2 = [
    ['LIZ LUXE - MONEY FLOW'],
    ['Period: ' + d.from + ' to ' + d.to],
    ['Every coin in and out. Credit sales show as $0 cash in — only actual collected money counts here.'],
    [],
    ['Date','Type','Description','Wallet','Cash In (KES)','Cash Out (KES)','Running Cash (KES)','Notes']
  ];

  var cashRunning = 0;

  // Opening balance as first row
  if (d.openingBalance !== 0) {
    cashRunning += d.openingBalance;
    s2.push([
      'Opening',
      'Opening Balance',
      'Balance carried forward from before ' + d.from,
      '—',
      d.openingBalance > 0 ? d.openingBalance : '',
      d.openingBalance < 0 ? Math.abs(d.openingBalance) : '',
      cashRunning,
      'Opening cash position'
    ]);
  }

  // Filter to only events with actual cash movement
  d.events.forEach(function(e) {
    var hasCash = e.cashIn > 0 || e.cashOut > 0;
    if (!hasCash) return;

    cashRunning += e.cashIn - e.cashOut;

    var note = '';
    if (e.type === 'sale' && e.creditChange > 0) {
      note = 'Credit sale: ' + fmt(e.creditChange) + ' owed. Only ' + fmt(e.cashIn) + ' collected in cash.';
    } else if (e.type === 'payment') {
      note = 'Debt repayment. Reduces credit owed by ' + fmt(Math.abs(e.creditChange)) + '.';
    } else if (e.type === 'returned') {
      note = 'Return/refund. Cash refunded to customer.';
    } else if (e.type === 'expense') {
      note = 'Business expense. Deducted from cash.';
    } else if (e.type === 'capital') {
      note = 'Capital injection. Added to business cash.';
    }

    s2.push([
      e.date,
      e.type === 'sale' ? 'Sale (Cash Collected)' : e.type === 'payment' ? 'Debt Payment' : e.type === 'returned' ? 'Return/Refund' : e.type === 'expense' ? 'Expense' : e.type === 'capital' ? 'Capital In' : e.type,
      e.title + (e.detail ? ' | ' + e.detail : ''),
      e.wallet || '—',
      e.cashIn > 0 ? e.cashIn : '',
      e.cashOut > 0 ? e.cashOut : '',
      cashRunning,
      note
    ]);
  });

  // Total row
  s2.push([]);
  s2.push(['','','','TOTALS', d.totalCashIn, d.totalCashOut, cashRunning, 'Final cash position']);

  // ═══════════════════════════════════════════════════════════════
  // BUILD MULTI-SHEET XML (Excel-compatible)
  // ═══════════════════════════════════════════════════════════════
  function escXml(v) {
    if (v === null || v === undefined) return '';
    return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function buildSheet(rows, name) {
    var xml = '<Worksheet ss:Name="' + escXml(name) + '"><Table>';
    rows.forEach(function(row, ri) {
      if (!row || !row.length) { xml += '<Row></Row>'; return; }
      xml += '<Row>';
      row.forEach(function(cell) {
        var styleId = '';
        if (ri === 0) styleId = ' ss:StyleID="H"';
        else if (ri === 2 && name === 'Money Flow') styleId = ' ss:StyleID="I"';
        else if (ri === 4) styleId = ' ss:StyleID="B"';
        else if (String(cell).toUpperCase() === 'TOTALS') styleId = ' ss:StyleID="T"';
        else if (String(cell) === 'Opening') styleId = ' ss:StyleID="O"';

        var val = (cell === null || cell === undefined) ? '' : cell;
        var type = (typeof val === 'number' || (typeof val === 'string' && val !== '' && !isNaN(Number(val)) && String(val).trim() !== '')) ? 'Number' : 'String';
        if (type === 'Number' && val === '') type = 'String';
        xml += '<Cell' + styleId + '><Data ss:Type="' + type + '">' + escXml(val) + '</Data></Cell>';
      });
      xml += '</Row>';
    });
    xml += '</Table></Worksheet>';
    return xml;
  }

  var workbook = '<?xml version="1.0" encoding="UTF-8"?><?mso-application progid="Excel.Sheet"?>' +
    '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">' +
    '<Styles>' +
    '<Style ss:ID="H"><Font ss:Bold="1" ss:Size="14" ss:Color="#C9972A"/></Style>' +
    '<Style ss:ID="B"><Font ss:Bold="1" ss:Size="11" ss:Color="#f0ead6"/><Interior ss:Color="#1c1c1c" ss:Pattern="Solid"/></Style>' +
    '<Style ss:ID="T"><Font ss:Bold="1" ss:Size="12" ss:Color="#C9972A"/></Style>' +
    '<Style ss:ID="O"><Font ss:Bold="1" ss:Color="#6aabf0"/></Style>' +
    '<Style ss:ID="I"><Font ss:Italic="1" ss:Size="10" ss:Color="#8a7f6a"/></Style>' +
    '</Styles>' +
    buildSheet(s1, 'Activity Report') +
    buildSheet(s2, 'Money Flow') +
    '</Workbook>';

  var blob = new Blob([workbook], {type: 'application/vnd.ms-excel;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'LizLuxe-Activity-' + d.from + '_to_' + d.to + '.xls';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Exported ' + d.events.length + ' transactions (2 sheets)', 'ok');
}

function shareWhatsApp() {
  var d = _data;
  if (!d || !d.events.length) { toast('Load data first', 'err'); return; }

  var dateStr = d.from === d.to ? d.from : d.from + ' to ' + d.to;
  var msg = '🌟 *LIZ LUXE — Activity Report*' + String.fromCharCode(10);
  msg += '📅 ' + dateStr + String.fromCharCode(10) + String.fromCharCode(10);

  // ── SALES ──
  var sales = d.events.filter(function(e){return e.type==='sale';});
  var totalSalesValue = sales.reduce(function(a,e){return a+(e.cashIn+e.creditChange);},0);
  var totalCollected = d.totalCashIn;
  var newCredit = d.events.filter(function(e){return e.type==='sale';}).reduce(function(a,e){return a+Math.max(0,e.creditChange);},0);

  msg += '📊 *SALES* (' + sales.length + ' transactions)' + String.fromCharCode(10);
  msg += '• Total Sales Value: ' + fmt(totalSalesValue) + String.fromCharCode(10);
  msg += '• Collected: ' + fmt(totalCollected) + String.fromCharCode(10);
  if (newCredit > 0) msg += '• New Credit: ' + fmt(newCredit) + String.fromCharCode(10);
  msg += String.fromCharCode(10);

  // ── BUYERS ──
  if (sales.length > 0) {
    msg += '👤 *BUYERS*' + String.fromCharCode(10);
    sales.forEach(function(e) {
      var cust = e.title.replace(/^Sale:\s*/,'');
      var items = e.detail.split('\|')[0] || e.detail;
      var total = e.cashIn + e.creditChange;
      var status = e.creditChange > 0 ? ' (Credit: ' + fmt(e.creditChange) + ')' : ' (Paid: ' + fmt(e.cashIn) + ')';
      msg += '• ' + cust + ' — ' + items + ' | ' + fmt(total) + ' (' + e.wallet + ')' + status + String.fromCharCode(10);
    });
    msg += String.fromCharCode(10);
  }

  // ── COLLECTIONS ──
  msg += '💰 *COLLECTIONS*' + String.fromCharCode(10);
  var cashIn = d.events.filter(function(e){return e.cashIn>0;}).reduce(function(a,e){return a+e.cashIn;},0);
  msg += '• Total Cash In: ' + fmt(cashIn) + String.fromCharCode(10);
  msg += '• Total Cash Out: ' + fmt(d.totalCashOut) + String.fromCharCode(10);
  msg += String.fromCharCode(10);

  // ── CREDIT ──
  if (d.finalCredit > 0) {
    msg += '💳 *CREDIT*' + String.fromCharCode(10);
    msg += '• Credit Owed: ' + fmt(d.finalCredit) + String.fromCharCode(10);
    var custSummary = [];
    for (var cust in d.customerBalances) {
      if (d.customerBalances[cust] > 0) {
        custSummary.push(cust + ': ' + fmt(d.customerBalances[cust]));
      }
    }
    if (custSummary.length > 0) {
      msg += '• Per Customer: ' + custSummary.slice(0, 5).join(', ') + (custSummary.length > 5 ? '...' : '') + String.fromCharCode(10);
    }
    msg += String.fromCharCode(10);
  }

  // ── PROFIT ──
  var cogs = sales.reduce(function(a,e){
    var items = e.detail.match(/\d+x\s+[^,|]+/g)||[];
    return a + items.reduce(function(s,it){var m=it.match(/(\d+)x\s+(.+)/);if(!m)return s;var qty=parseInt(m[1]);var name=m[2].trim();var item=inv.find(function(i){return i.name===name;});return s+(item?item.buying_price*qty:0);},0);
  },0);
  var grossProfit = totalSalesValue - cogs;
  var margin = totalSalesValue > 0 ? Math.round((grossProfit/totalSalesValue)*100) : 0;
  msg += '📈 *PROFIT*' + String.fromCharCode(10);
  msg += '• Revenue: ' + fmt(totalSalesValue) + String.fromCharCode(10);
  msg += '• Gross Profit: ' + fmt(grossProfit) + ' (' + margin + '% margin)' + String.fromCharCode(10);
  msg += String.fromCharCode(10);

  // ── CASH POSITION ──
  msg += '💵 *CASH POSITION*' + String.fromCharCode(10);
  msg += '• Cash in Hand (Net Balance): ' + fmt(d.finalBalance) + String.fromCharCode(10);
  msg += '• Credit Outstanding: ' + fmt(d.finalCredit) + String.fromCharCode(10);
  msg += '• Total Business Value: ' + fmt(d.finalNet) + String.fromCharCode(10);
  msg += String.fromCharCode(10);

  msg += '✨ _Liz Luxe POS_';
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}function initApp() {
  var sel = document.getElementById('month-sel');
  var now = new Date();
  for (var i = 0; i < 24; i++) {
    var d2 = new Date(now.getFullYear(), now.getMonth() - i, 1);
    var val = d2.getFullYear() + '-' + String(d2.getMonth()+1).padStart(2,'0');
    var label = d2.toLocaleDateString('en-KE',{month:'long',year:'numeric'});
    var opt = document.createElement('option');
    opt.value = val; opt.textContent = label;
    if (i === 0) opt.selected = true;
    sel.appendChild(opt);
  }
  loadData();
}

if (loadSession()) {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-shell').style.display = 'block';
  initApp();
} else {
  // Show login screen if no session
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app-shell').style.display = 'none';
}
</script>
